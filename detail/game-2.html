<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <link rel="shortcut icon" href="../favicon.png" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五子棋 | Creative Developer Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.2/anime.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
        }

        :root {
            --primary-gradient: linear-gradient(135deg, #1a1a1a 0%, #4a4a4a 100%);
            --text-primary: #1a1a1a;
            --text-secondary: #525252;
            --text-muted: #737373;
            --background-light: #fafafa;
            --background-dark: #1a1a1a;
            --card-background: #ffffff;
            --border-color: #d4d4d4;
            --border-light: #e5e5e5;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            --shadow-hover: 0 15px 40px rgba(0, 0, 0, 0.12);
        }

        body {
            width: 100vw;
            min-height: 100vh;
            margin: 0;
            padding: 0;
            background: var(--background-light);
            overflow-x: hidden;
            color: var(--text-primary);
        }

        .detail-nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 72px;
            background: rgba(250, 250, 250, 0.95);
            backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 60px;
            z-index: 100;
            border-bottom: 1px solid var(--border-light);
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.3s ease;
            padding: 10px 20px;
            border-radius: 30px;
        }

        .back-btn:hover {
            color: var(--text-primary);
            background: var(--border-light);
        }

        .back-btn i {
            font-size: 14px;
            transition: transform 0.3s ease;
        }

        .back-btn:hover i {
            transform: translateX(-4px);
        }

        .nav-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .nav-placeholder {
            width: 120px;
        }

        .detail-hero {
            padding: 140px 80px 80px;
            background: linear-gradient(180deg, var(--background-dark) 0%, var(--background-light) 100%);
            color: #fff;
            min-height: 50vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        .detail-hero-tags {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        .detail-tag {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
        }

        .detail-hero-title {
            font-size: 56px;
            font-weight: 700;
            margin-bottom: 16px;
            line-height: 1.2;
        }

        .detail-hero-description {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.8);
            max-width: 700px;
            line-height: 1.6;
        }

        .detail-content {
            padding: 80px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .detail-section {
            margin-bottom: 80px;
        }

        .detail-section-title {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 32px;
            color: var(--text-primary);
            position: relative;
            padding-left: 20px;
        }

        .detail-section-title::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 4px;
            height: 28px;
            background: var(--primary-gradient);
            border-radius: 2px;
        }

        .iframe-container {
            width: 100%;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: var(--shadow);
            background: var(--card-background);
        }

        .iframe-container iframe {
            width: 100%;
            height: 600px;
            border: none;
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        .feature-card {
            background: var(--card-background);
            border-radius: 16px;
            padding: 32px;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
        }

        .feature-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-hover);
        }

        .feature-icon {
            width: 56px;
            height: 56px;
            background: var(--border-light);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            font-size: 24px;
            color: var(--text-primary);
        }

        .feature-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .feature-text {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .tech-stack {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .tech-item {
            padding: 12px 24px;
            background: var(--card-background);
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            box-shadow: var(--shadow);
        }

        .external-link-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 16px 32px;
            background: var(--primary-gradient);
            color: #fff;
            text-decoration: none;
            border-radius: 30px;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.3s ease;
            margin-top: 40px;
        }

        .external-link-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .game-controls {
            background: var(--card-background);
            border-radius: 16px;
            padding: 24px;
            box-shadow: var(--shadow);
            margin-top: 24px;
        }

        .game-controls h4 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text-primary);
        }

        .control-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .control-item {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .control-key {
            padding: 6px 12px;
            background: var(--border-light);
            border-radius: 6px;
            font-family: monospace;
            font-weight: 600;
            color: var(--text-primary);
        }

        @media (max-width: 768px) {
            .detail-nav {
                padding: 0 20px;
            }

            .detail-hero {
                padding: 120px 24px 60px;
            }

            .detail-hero-title {
                font-size: 36px;
            }

            .detail-content {
                padding: 40px 24px;
            }

            .iframe-container iframe {
                height: 500px;
            }
        }
    </style>
</head>

<body>
    <nav class="detail-nav">
        <a href="../works.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i><span>返回作品集</span></a>
        <div class="nav-title">五子棋</div>
        <div class="nav-placeholder"></div>
    </nav>
    <header class="detail-hero">
        <div class="detail-hero-tags"><span class="detail-tag">基础逻辑书写</span></div>
        <h1 class="detail-hero-title">五子棋</h1>
        <p class="detail-hero-description">双人对战五子棋游戏，15×15标准棋盘，支持悔棋功能。黑子先行，交替落子，任意方向五连珠即为获胜。</p>
    </header>
    <main class="detail-content">
        <section class="detail-section">
            <h2 class="detail-section-title">游戏预览</h2>
            <div class="iframe-container"><iframe src="../program/gobang.html" title="五子棋游戏预览"></iframe></div>
        </section>
        <section class="detail-section">
            <h2 class="detail-section-title">游戏说明</h2>
            <div class="feature-grid">
                <div class="feature-card">
                    <div class="feature-icon"><i class="fa-solid fa-chess-board"></i></div>
                    <h3 class="feature-title">标准棋盘</h3>
                    <p class="feature-text">15×15 围棋式棋盘，包含九星标记点。</p>
                </div>
                <div class="feature-card">
                    <div class="feature-icon"><i class="fa-solid fa-users"></i></div>
                    <h3 class="feature-title">双人对战</h3>
                    <p class="feature-text">黑白双方交替落子，支持悔棋功能。</p>
                </div>
                <div class="feature-card">
                    <div class="feature-icon"><i class="fa-solid fa-gem"></i></div>
                    <h3 class="feature-title">精美棋子</h3>
                    <p class="feature-text">径向渐变渲染立体棋子效果，最后一手高亮标记。</p>
                </div>
                <div class="feature-card">
                    <div class="feature-icon"><i class="fa-solid fa-crown"></i></div>
                    <h3 class="feature-title">胜负判定</h3>
                    <p class="feature-text">四方向（横/竖/对角）五连珠检测，精准判定胜负。</p>
                </div>
            </div>
            <div class="game-controls">
                <h4>操作说明</h4>
                <div class="control-list">
                    <div class="control-item"><span class="control-key">鼠标点击</span><span>棋盘交叉点上落子</span></div>
                </div>
            </div>
        </section>
        <section class="detail-section">
            <h2 class="detail-section-title">技术栈</h2>
            <div class="tech-stack"><span class="tech-item">HTML5</span><span class="tech-item">CSS3</span><span
                    class="tech-item">JavaScript</span><span class="tech-item">Canvas API</span></div>
        </section>
        <section class="detail-section"><a href="../program/gobang.html" target="_blank"
                class="external-link-btn"><span>在新窗口中打开游戏</span><i class="fa-solid fa-external-link-alt"></i></a>
        </section>
    </main>
    <script>document.addEventListener('DOMContentLoaded', () => { anime.timeline().add({ targets: '.detail-hero-tags .detail-tag', opacity: [0, 1], translateY: [20, 0], delay: anime.stagger(100), duration: 600, easing: 'easeOutQuad' }).add({ targets: '.detail-hero-title', opacity: [0, 1], translateY: [40, 0], duration: 800, easing: 'easeOutQuad' }, '-=400').add({ targets: '.detail-hero-description', opacity: [0, 1], translateY: [30, 0], duration: 800, easing: 'easeOutQuad' }, '-=600').add({ targets: '.detail-section', opacity: [0, 1], translateY: [40, 0], delay: anime.stagger(150), duration: 800, easing: 'easeOutQuad' }, '-=400'); });</script>
</body>

</html>
