<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <link rel="shortcut icon" href="../favicon.png" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 作品 | Creative Developer Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.2/anime.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
        }

        :root {
            --primary-gradient: linear-gradient(135deg, #1a1a1a 0%, #4a4a4a 100%);
            --text-primary: #1a1a1a;
            --text-secondary: #525252;
            --text-muted: #737373;
            --background-light: #fafafa;
            --background-dark: #1a1a1a;
        }

        body {
            width: 100vw;
            min-height: 100vh;
            margin: 0;
            padding: 0;
            background: var(--background-light);
            overflow-x: hidden;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .placeholder {
            text-align: center;
            padding: 60px;
        }

        .placeholder i {
            font-size: 80px;
            color: #d4d4d4;
            margin-bottom: 24px;
            display: block;
        }

        .placeholder h1 {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .placeholder p {
            color: var(--text-secondary);
            font-size: 18px;
            margin-bottom: 30px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.3s ease;
            padding: 10px 20px;
            border-radius: 30px;
        }

        .back-btn:hover {
            color: var(--text-primary);
            background: #e5e5e5;
        }
    </style>
</head>

<body>
    <div class="placeholder">
        <i class="fa-solid fa-cube"></i>
        <h1>三维建模作品</h1>
        <p>三维建模作品正在准备中，即将上线。</p>
        <a href="../works.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i><span>返回作品集</span></a>
    </div>
</body>

</html>
