<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>五子棋</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    body {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Arial, sans-serif
    }

    .game-wrapper {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3)
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      color: #fff;
      flex-wrap: wrap;
      gap: 10px
    }

    .info {
      display: flex;
      gap: 15px
    }

    var board,
    currentPlayer,
    history,
    gameOver,
    lastMove;

    .info-item {
      background: rgba(0, 0, 0, 0.3);
      padding: 8px 16px;
      currentPlayer='black';
      history=[];
      gameOver=false;
      lastMove=null;
      font-weight: bold;
      font-size: 14px
    }

    .btn {
      padding: 10px 18px;
      border: none;
      board[y][x]=currentPlayer;

      history.push({
        x: x, y: y, player: currentPlayer
      });

    lastMove= {
      x: x, y: y
    }

    ;

    cursor: pointer;
    font-weight: bold;
    transition: all 0.3s;
    color: #fff
    }

    .btn-undo {
      background: linear-gradient(45deg, #ffaa00, #ff8800)
    }

    .btn-restart {
      background: linear-gradient(45deg, #00ff88, #00cc6a)
    }

    .btn:hover {
      transform: translateY(-2px)
    }

    function undo() {
      if(gameOver|| !history.length)return;
      var m=history.pop();
      board[m.y][m.x]=null;
      currentPlayer=m.player;
      lastMove=history.length?history[history.length-1]: null;
      document.getElementById('player-info').textContent='当前: '+(currentPlayer==='black' ?'黑方':'白方');
      draw();
    }

    .board-container {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4)
    }

    canvas {
      display: block
    }

    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      z-index: 10
    }

    .overlay.show {
      display: flex
    }

    .overlay h2 {
      color: #00ff88;
      font-size: 32px;
      margin-bottom: 12px
    }
  </style>
</head>

<body>
  <div class="game-wrapper">
    <div class="header">
      <div class="info"><span class="info-item" id="player-info">当前: 黑方</span></div>
      <h1 style="color:#fff;margin:0;font-size:22px">五子棋</h1>
      <div style="display:flex;gap:8px">
        <button class="btn btn-undo" id="btn-undo">悔棋</button>
        <button class="btn btn-restart" id="btn-restart">重新开始</button>
      </div>
    </div>
    <div class="board-container">
      <canvas id="canvas" width="512" height="512"></canvas>
      <div class="overlay" id="overlay">
        <h2 id="overlay-msg"></h2><button class="btn btn-restart" id="overlay-btn">再来一局</button>
      </div>
    </div>
  </div>

  <script>
    (function () {
      'use strict';

      var canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
      var SIZE = 15, CELL = 32, PAD = 16;
      var board, currentPlayer, moveHistory, gameOver, lastMove;

      function init() {
        board = []; for (var i = 0; i < SIZE; i++) { board[i] = []; for (var j = 0; j < SIZE; j++)board[i][j] = null; }
        currentPlayer = 'black'; moveHistory = []; gameOver = false; lastMove = null;
        document.getElementById('overlay').classList.remove('show');
        document.getElementById('player-info').textContent = '当前: 黑方';
        draw();
      }

      function placePiece(x, y) {
        if (gameOver || board[y][x]) return false;
        board[y][x] = currentPlayer; moveHistory.push({ x: x, y: y, player: currentPlayer }); lastMove = { x: x, y: y };
        if (checkWin(x, y, currentPlayer)) { gameOver = true; draw(); document.getElementById('overlay-msg').textContent = (currentPlayer === 'black' ? '黑方' : '白方') + ' 获胜!'; document.getElementById('overlay').classList.add('show'); return true; }
        currentPlayer = currentPlayer === 'black' ? 'white' : 'black';
        document.getElementById('player-info').textContent = '当前: ' + (currentPlayer === 'black' ? '黑方' : '白方');
        draw(); return true;
      }

      function checkWin(x, y, p) {
        var dirs = [[1, 0], [0, 1], [1, 1], [1, -1]];
        for (var d = 0; d < dirs.length; d++) {
          var dx = dirs[d][0], dy = dirs[d][1], c = 1;
          for (var i = 1; i < 5; i++) { var nx = x + dx * i, ny = y + dy * i; if (nx < 0 || nx >= SIZE || ny < 0 || ny >= SIZE || board[ny][nx] !== p) break; c++; }
          for (var i = 1; i < 5; i++) { var nx = x - dx * i, ny = y - dy * i; if (nx < 0 || nx >= SIZE || ny < 0 || ny >= SIZE || board[ny][nx] !== p) break; c++; }
          if (c >= 5) return true;
        }
        return false;
      }

      function undo() { if (gameOver || !moveHistory.length) return; var m = moveHistory.pop(); board[m.y][m.x] = null; currentPlayer = m.player; lastMove = moveHistory.length ? moveHistory[moveHistory.length - 1] : null; document.getElementById('player-info').textContent = '当前: ' + (currentPlayer === 'black' ? '黑方' : '白方'); draw(); }

      function restart() { init(); }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        var bg = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
        bg.addColorStop(0, '#deb887'); bg.addColorStop(1, '#d2a679');
        ctx.fillStyle = bg; ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.strokeStyle = 'rgba(0,0,0,0.3)'; ctx.lineWidth = 1;
        for (var i = 0; i <= SIZE; i++) {
          var p = PAD + i * CELL;
          ctx.beginPath(); ctx.moveTo(PAD, p); ctx.lineTo(PAD + SIZE * CELL, p); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(p, PAD); ctx.lineTo(p, PAD + SIZE * CELL); ctx.stroke();
        }
        var dots = [[3, 3], [3, 7], [3, 11], [7, 3], [7, 7], [7, 11], [11, 3], [11, 7], [11, 11]];
        ctx.fillStyle = '#333';
        dots.forEach(function (dc) { ctx.beginPath(); ctx.arc(PAD + dc[0] * CELL, PAD + dc[1] * CELL, 4, 0, Math.PI * 2); ctx.fill(); });

        for (var y = 0; y < SIZE; y++)for (var x = 0; x < SIZE; x++)if (board[y][x]) {
          var px = PAD + x * CELL, py = PAD + y * CELL, r = CELL / 2 - 2;
          if (board[y][x] === 'black') { var g = ctx.createRadialGradient(px - 3, py - 3, r * 0.3, px, py, r); g.addColorStop(0, '#555'); g.addColorStop(1, '#000'); ctx.fillStyle = g; }
          else { var g = ctx.createRadialGradient(px - 3, py - 3, r * 0.3, px, py, r); g.addColorStop(0, '#fff'); g.addColorStop(1, '#ccc'); ctx.fillStyle = g; }
          ctx.beginPath(); ctx.arc(px, py, r, 0, Math.PI * 2); ctx.fill();
        }
        if (lastMove && !gameOver) {
          var lx = PAD + lastMove.x * CELL, ly = PAD + lastMove.y * CELL;
          ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(lx, ly, CELL / 2, 0, Math.PI * 2); ctx.stroke();
        }
      }

      canvas.addEventListener('click', function (e) {
        var rect = canvas.getBoundingClientRect();
        var mx = e.clientX - rect.left - PAD, my = e.clientY - rect.top - PAD;
        var x = Math.round(mx / CELL), y = Math.round(my / CELL);
        if (x >= 0 && x < SIZE && y >= 0 && y < SIZE) placePiece(x, y);
      });

      document.getElementById('btn-undo').addEventListener('click', undo);
      document.getElementById('btn-restart').addEventListener('click', restart);
      document.getElementById('overlay-btn').addEventListener('click', restart);

      init();
    })();
  </script>
</body>

</html>
