<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
    <link rel="shortcut icon" href="../favicon.png" type="image/x-icon">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>贪吃蛇</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    body {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Arial, sans-serif
    }

    .game-wrapper {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3)
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      color: #fff
    }

    .info {
      display: flex;
      gap: 15px
    }

    .info-item {
      background: rgba(0, 0, 0, 0.3);
      padding: 8px 16px;
      border-radius: 8px;
      font-weight: bold;
      font-size: 14px
    }

    .btn {
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s;
      color: #fff;
      background: linear-gradient(45deg, #00ff88, #00cc6a)
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(0, 255, 136, 0.4)
    }

    canvas {
      display: block;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4)
    }

    .controls {
      margin-top: 12px;
      color: rgba(255, 255, 255, 0.6);
      font-size: 12px;
      text-align: center
    }
  </style>
</head>

<body>
  <div class="game-wrapper">
    <div class="header">
      <div class="info">
        <span class="info-item">得分: <span id="score">0</span></span>
        <span class="info-item">最高: <span id="highscore">0</span></span>
      </div>
      <h1 style="color:#fff;margin:0;font-size:22px">贪吃蛇</h1>
      <button class="btn" id="btn-restart">重新开始</button>
    </div>
    <canvas id="canvas" width="400" height="400"></canvas>
    <div class="controls">方向键/WASD 控制方向 | 空格键重新开始 | 触屏滑动操作</div>
  </div>

  <script>
    'use strict';

    var canvas = document.getElementById('canvas');
    var ctx = canvas.getContext('2d');
    var scoreEl = document.getElementById('score');
    var highscoreEl = document.getElementById('highscore');

    var GRID = 20;
    var COLS = canvas.width / GRID;
    var ROWS = canvas.height / GRID;

    var snake, direction, nextDirection, food, score, highScore, gameOver, gameLoopId, lastTime, speed;

    function init() {
      snake = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
      direction = { x: 1, y: 0 };
      nextDirection = { x: 1, y: 0 };
      score = 0;
      highScore = parseInt(localStorage.getItem('snakeHighScore') || '0', 10);
      gameOver = false;
      speed = 100;
      lastTime = 0;
      food = spawnFood();
      updateUI();
      draw();
    }

    function spawnFood() {
      var pos;
      do { pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) }; }
      while (snake.some(function (s) { return s.x === pos.x && s.y === pos.y; }));
      return pos;
    }

    function update() {
      if (gameOver) return;
      direction = { x: nextDirection.x, y: nextDirection.y };
      var head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };
      if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS || snake.some(function (s) { return s.x === head.x && s.y === head.y; })) {
        gameOver = true;
        if (score > highScore) { highScore = score; localStorage.setItem('snakeHighScore', String(highScore)); }
        updateUI();
        return;
      }
      snake.unshift(head);
      if (head.x === food.x && head.y === food.y) { score += 10; food = spawnFood(); }
      else { snake.pop(); }
      updateUI();
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      var bg = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
      bg.addColorStop(0, '#0a0a2e'); bg.addColorStop(1, '#1a0a2e');
      ctx.fillStyle = bg; ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = '#00ff88'; ctx.beginPath();
      ctx.roundRect(food.x * GRID + 2, food.y * GRID + 2, GRID - 4, GRID - 4, 4); ctx.fill();

      snake.forEach(function (s, i) {
        var g = ctx.createLinearGradient(s.x * GRID, s.y * GRID, s.x * GRID + GRID, s.y * GRID + GRID);
        g.addColorStop(0, i === 0 ? '#00ff88' : '#00cc6a'); g.addColorStop(1, i === 0 ? '#00cc6a' : '#009944');
        ctx.fillStyle = g; ctx.beginPath();
        ctx.roundRect(s.x * GRID + 1, s.y * GRID + 1, GRID - 2, GRID - 2, 5); ctx.fill();
      });

      if (gameOver) {
        ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#ff6b6b'; ctx.font = 'bold 36px Arial'; ctx.textAlign = 'center';
        ctx.fillText('游戏结束', canvas.width / 2, canvas.height / 2 - 10);
        ctx.fillStyle = '#fff'; ctx.font = '16px Arial';
        ctx.fillText('按空格键重新开始', canvas.width / 2, canvas.height / 2 + 30);
      }
    }

    function updateUI() { scoreEl.textContent = score; highscoreEl.textContent = highScore; }

    function gameLoop(timestamp) {
      if (!gameOver && timestamp - lastTime >= speed) { lastTime = timestamp; update(); }
      draw();
      gameLoopId = requestAnimationFrame(gameLoop);
    }

    function restart() { cancelAnimationFrame(gameLoopId); init(); }

    document.getElementById('btn-restart').addEventListener('click', restart);

    document.addEventListener('keydown', function (e) {
      var map = { ArrowUp: [0, -1], ArrowDown: [0, 1], ArrowLeft: [-1, 0], ArrowRight: [1, 0], KeyW: [0, -1], KeyS: [0, 1], KeyA: [-1, 0], KeyD: [1, 0] };
      if (map[e.code]) {
        e.preventDefault();
        var nx = map[e.code][0], ny = map[e.code][1];
        if (direction.x !== -nx || direction.y !== -ny) nextDirection = { x: nx, y: ny };
      }
      if (e.code === 'Space') { e.preventDefault(); if (gameOver) restart(); }
    });

    var touchStart;
    canvas.addEventListener('touchstart', function (e) { touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY }; e.preventDefault(); });
    canvas.addEventListener('touchend', function (e) {
      if (!touchStart) return;
      var dx = e.changedTouches[0].clientX - touchStart.x;
      var dy = e.changedTouches[0].clientY - touchStart.y;
      if (Math.abs(dx) > Math.abs(dy)) nextDirection = { x: dx > 0 ? 1 : -1, y: 0 };
      else nextDirection = { x: 0, y: dy > 0 ? 1 : -1 };
      touchStart = null;
    });

    init();
    gameLoopId = requestAnimationFrame(gameLoop);
  </script>
</body>

</html>
